<form method="post">
    {% csrf_token %}
    {% for field in form %}
        <div class="form-group">
            {{ field }} 
            
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        
            {% if field.errors %}
                <div class="error-message" style="color: red;">
                    {% for error in field.errors %}
                        <p>{{ error }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        </div>
    {% endfor %}
    <button type="submit">Submit Waiver</button>
</form>
